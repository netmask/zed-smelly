name = "Smelly"
grammar = "smelly"
path_suffixes = ["sy"]
line_comments = ["# "]
tab_size = 2
hard_tabs = false

brackets = [
  { start = "(", end = ")", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "[", end = "]", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "{", end = "}", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
]

word_characters = ["_"]

autoclose_before = ";:.,=}])> \n\t"
